<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniTrack — Iniciar sesión</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="auth-page">

    <div class="auth-container">
        <!-- Logo / Cabecera -->
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fa-solid fa-film"></i>
            </div>
            <h1>AniTrack</h1>
            <p class="auth-subtitle">Tu gestor personal de anime</p>
        </div>

        <!-- Formulario de login -->
        <form id="loginForm" class="auth-form" novalidate>
            <div class="form-group">
                <label for="username">
                    <i class="fa-solid fa-user"></i> Usuario
                </label>
                <input type="text" id="username" name="username"
                       placeholder="Nombre de usuario" autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">
                    <i class="fa-solid fa-lock"></i> Contraseña
                </label>
                <input type="password" id="password" name="password"
                       placeholder="Contraseña" autocomplete="current-password">
            </div>

            <!-- Mensaje de error -->
            <div id="errorMsg" class="error-msg" style="display:none;"></div>

            <div class="auth-buttons">
                <button type="button" id="loginButton" class="btn-primary">
                    <i class="fa-solid fa-right-to-bracket"></i> Aceptar
                </button>
                <button type="button" id="newUserButton" class="btn-secondary">
                    <i class="fa-solid fa-user-plus"></i> Nuevo usuario
                </button>
            </div>
        </form>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/clases.js"></script>
    <script src="../js/index.js"></script>
</body>
</html>
