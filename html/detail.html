<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniTrack — Detalle</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <!-- ======================== MENÚ ======================== -->
    <header>
        <nav class="navbar">
            <div class="navbar-brand">
                <i class="fa-solid fa-film"></i>
                <span>AniTrack</span>
            </div>
            <ul class="navbar-links">
                <li>
                    <a href="anime.html">
                        <i class="fa-solid fa-list"></i> Anime
                    </a>
                </li>
                <!-- Dropdown de Listas -->
                <li class="dropdown">
                    <a href="#" class="dropbtn">
                        <i class="fa-solid fa-layer-group"></i> Listas
                        <i class="fa-solid fa-chevron-down" style="font-size:0.7em;"></i>
                    </a>
                    <div class="dropdown-content">
                        <span class="dropdown-header">Mis listas</span>
                        <a href="listas.html?lista=watching">
                            <i class="fa-solid fa-tv"></i>
                            Viendo actualmente
                            <span class="counter watching-count">0</span>
                        </a>
                        <a href="listas.html?lista=planToWatch">
                            <i class="fa-solid fa-bookmark"></i>
                            Plan to Watch
                            <span class="counter plan-count">0</span>
                        </a>
                    </div>
                </li>
                <li>
                    <a href="video.html">
                        <i class="fa-solid fa-video"></i> Video
                    </a>
                </li>
                <!-- Dropdown de Usuario -->
                <li class="dropdown">
                    <a href="#" class="dropbtn" id="menuButton">
                        <i class="fa-solid fa-circle-user"></i> Usuario
                        <i class="fa-solid fa-chevron-down" style="font-size:0.7em;"></i>
                    </a>
                    <div class="dropdown-content">
                        <a href="#" id="logoutButton" class="logout-link">
                            <i class="fa-solid fa-right-from-bracket"></i> Logout
                        </a>
                    </div>
                </li>
            </ul>
        </nav>
    </header>

    <!-- ======================== CONTENIDO ======================== -->
    <main class="main-content detail-page">

        <!-- Botón volver -->
        <div class="back-bar">
            <button id="backButton" class="btn-back">
                <i class="fa-solid fa-arrow-left"></i> Volver
            </button>
        </div>

        <!-- Loader mientras carga el detalle -->
        <div id="loader" class="loader-overlay">
            <div class="spinner"></div>
            <p>Cargando detalle...</p>
        </div>

        <!-- Contenido del detalle (generado por detail.js) -->
        <div id="detailContainer" class="detail-container">
        </div>
    </main>

    <script src="../js/config.js"></script>
    <script src="../js/clases.js"></script>
    <script src="../js/menu.js"></script>
    <script src="../js/detail.js"></script>
</body>
</html>
